plugins {
    id 'java'
    id 'maven-publish'
}
version = "0.0.1"

repositories {
    maven {
        url "https://www.hec.usace.army.mil/nexus/repository/maven-public/"
    }
    mavenCentral()
}

dependencies {
    runtimeOnly 'org.xerial:sqlite-jdbc:3.30.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.4.0'
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.4.0"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:5.4.0"
    testRuntimeOnly "org.junit.vintage:junit-vintage-engine:5.4.0"
}

test {
    useJUnitPlatform()
    jvmArgs = ["-Djava.io.tmpdir=c:/temp"]
}


task runApp(type: JavaExec) {
    main = 'hec.ensemble.EnsembleUtility'
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs = ["-Djava.io.tmpdir=c:/temp"]
    args = ["c:/temp/hefs_cache", "30","1","src/test/resources/database/ResSim.db"]
}

task runEnsembleMetrics(type: JavaExec) {
    main = 'hec.ensemble.EnsembleUtility'
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs = ["-Djava.io.tmpdir=c:/temp"]
    args = ["c:/temp/hefs_cache", "100","10","C:/temp/ResSim.db"]
}

publishing{
    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/HydrologicEngineeringCenter/FIRO_TSEnsembles"
            credentials {
                username = "Brennan1994"
                password = "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"
            }
        }
    }
    publications{
        gpr(MavenPublication) {
            from (components.java)
            versionMapping{
                usage('java-api'){
                    fromResolutionOf('runtimeClassPath')
                }
                usage('java-runtime'){
                    fromResolutionResult()
                }
            }
        }
    }
}

task defaultProperties {
    println " User Home:"
    println "Project: $project"
    println "Name: $name"
    println "Path: $path"
    println "Project directory: $projectDir"
    println "Build directory: $buildDir"
    println "Version: $version"
    println "Group: $project.group"
    println "Description: $project.description"
}



